name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-edge:
    name: Build edge image
    needs: release-please
    if: needs.release-please.outputs.release_created != 'true'
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository }}
      ADDIN_HOST: addin.staging.postguard.eu
      PKG_URL: https://staging.postguard.eu/pkg
      CRYPTIFY_URL: https://fileshare.staging.postguard.eu
      POSTGUARD_WEBSITE_URL: https://staging.postguard.eu
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push :edge
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:edge
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          build-args: |
            ADDIN_PUBLIC_URL=https://${{ env.ADDIN_HOST }}/
            PKG_URL=${{ env.PKG_URL }}
            CRYPTIFY_URL=${{ env.CRYPTIFY_URL }}
            POSTGUARD_WEBSITE_URL=${{ env.POSTGUARD_WEBSITE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-release:
    name: Build release image
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository }}
      ADDIN_HOST: addin.postguard.eu
      PKG_URL: https://postguard.eu/pkg
      CRYPTIFY_URL: https://fileshare.postguard.eu
      POSTGUARD_WEBSITE_URL: https://postguard.eu
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push release image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ needs.release-please.outputs.tag_name }}
            ${{ env.IMAGE }}:${{ needs.release-please.outputs.version }}
            ${{ env.IMAGE }}:latest
          build-args: |
            ADDIN_PUBLIC_URL=https://${{ env.ADDIN_HOST }}/
            PKG_URL=${{ env.PKG_URL }}
            CRYPTIFY_URL=${{ env.CRYPTIFY_URL }}
            POSTGUARD_WEBSITE_URL=${{ env.POSTGUARD_WEBSITE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PostGuard - Verify Identity</title>
    <script
      type="text/javascript"
      src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"
    />
  </head>

  <body class="ms-font-m ms-Fabric">
    <div id="pg-dialog-container">
      <header id="pg-dialog-header">
        <img width="28" height="28" src="../../assets/icon-32.png" alt="PostGuard" />
        <h1 class="ms-font-l" id="pg-dialog-title">Verify Your Identity</h1>
      </header>

      <section id="pg-dialog-info">
        <p class="ms-font-m" id="pg-dialog-heading">
          Scan the QR code below with your Yivi app to verify your identity.
        </p>

        <!-- Sender info (for decryption) -->
        <div id="pg-sender-info" style="display: none">
          <span class="ms-font-s pg-muted">Encrypted by: </span>
          <span class="ms-font-m" id="pg-sender-email"></span>
        </div>

        <!-- Required attributes table -->
        <div id="pg-attributes-info" style="display: none">
          <h3 class="ms-font-s pg-section-title">Required attributes:</h3>
          <table id="pg-attribute-table" class="pg-attribute-table">
            <tbody></tbody>
          </table>
        </div>
      </section>

      <!-- Yivi QR code container -->
      <section id="yivi-web-form" class="pg-yivi-container"></section>

      <!-- Help section -->
      <section id="pg-yivi-help">
        <details>
          <summary class="ms-font-m-plus">Don't have the Yivi app?</summary>
          <div class="pg-help-content">
            <p class="ms-font-m">
              Yivi is a free app that lets you prove who you are, without unnecessary data sharing.
            </p>
            <h4 class="ms-font-m">Download Yivi:</h4>
            <p>
              <a href="https://yivi.app" target="_blank" class="pg-link">
                <i class="ms-Icon ms-Icon--Globe"></i> yivi.app
              </a>
            </p>
          </div>
        </details>
      </section>
    </div>
  </body>
</html>

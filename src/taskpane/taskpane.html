<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PostGuard</title>
    <script
      type="text/javascript"
      src="https://appsforoffice.microsoft.com/lib/beta/hosted/office.js"
    ></script>
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
  </head>
  <body class="pg-app">
    <div id="pg-status" class="pg-status pg-status-hidden" role="status"></div>

    <main class="pg-main">
      <!-- Loading view -->
      <section id="view-loading" class="pg-view">
        <div class="pg-spinner" aria-label="Loading"></div>
      </section>

      <!-- Compose view -->
      <section id="view-compose" class="pg-view" hidden>
        <div class="pg-toggle-row">
          <label class="pg-switch">
            <input type="checkbox" id="pg-toggle-encrypt" />
            <span class="pg-switch-track"></span>
          </label>
          <span id="pg-toggle-label" class="pg-toggle-label"></span>
        </div>

        <div id="pg-bcc-warning" class="pg-warning" hidden></div>

        <div id="pg-manage-section" class="pg-policy-section">
          <h3 id="pg-manage-title" class="pg-section-title"></h3>
          <div id="pg-manage-panel"></div>
        </div>

        <div id="pg-sign-section" class="pg-policy-section">
          <h3 id="pg-sign-title" class="pg-section-title"></h3>
          <div id="pg-sign-panel"></div>
        </div>

        <button id="pg-btn-encrypt-send" class="pg-btn pg-btn-primary" type="button" hidden></button>
      </section>

      <!-- Yivi flow view (QR + scan) -->
      <section id="view-yivi" class="pg-view" hidden>
        <h2 id="pg-yivi-title" class="pg-section-title"></h2>
        <p id="pg-yivi-subtitle" class="pg-subtitle"></p>
        <div id="yivi-web-form" class="pg-yivi-host"></div>
        <div class="pg-button-row pg-button-row-end">
          <button id="pg-btn-yivi-cancel" class="pg-btn pg-btn-secondary" type="button">Cancel</button>
        </div>
      </section>

      <!-- Read-mode encrypted detection -->
      <section id="view-read-encrypted" class="pg-view" hidden>
        <p id="pg-read-encrypted-text" class="pg-subtitle"></p>
        <button id="pg-btn-decrypt" class="pg-btn pg-btn-primary" type="button"></button>
      </section>

      <!-- Read-mode was-encrypted (decrypted previously) -->
      <section id="view-read-was-encrypted" class="pg-view" hidden>
        <div class="pg-info">
          <span id="pg-was-encrypted-text"></span>
        </div>
      </section>

      <!-- Read-mode plaintext (just decrypted) -->
      <section id="view-decrypted" class="pg-view" hidden>
        <div id="pg-decrypted-badges" class="pg-badges"></div>
        <div id="pg-decrypted-meta" class="pg-meta"></div>
        <h3 id="pg-decrypted-subject" class="pg-decrypted-subject"></h3>
        <iframe
          id="pg-decrypted-body"
          class="pg-decrypted-body"
          sandbox="allow-same-origin"
          referrerpolicy="no-referrer"
        ></iframe>
        <div id="pg-decrypted-attachments" class="pg-decrypted-attachments" hidden></div>
      </section>

      <!-- Not-applicable (read mode but no PostGuard content) -->
      <section id="view-read-noop" class="pg-view" hidden>
        <p class="pg-subtitle">This message is not encrypted with PostGuard.</p>
      </section>

      <!-- Error view -->
      <section id="view-error" class="pg-view" hidden>
        <div class="pg-error" id="pg-error-text"></div>
        <button id="pg-error-retry" class="pg-btn pg-btn-secondary" type="button">Retry</button>
      </section>
    </main>
  </body>
</html>
